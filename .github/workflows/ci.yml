name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install ruff
      - name: Run linter
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sentinel-backend:test ./backend

  auto-docs:
    runs-on: ubuntu-latest
    needs: lint-and-format
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Documentation Dependencies
        run: pip install -r backend/requirements.txt
      - name: Run script to update docs
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python scripts/update_docs.py
      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Check for modifications and push
        run: |
          if ! git diff --quiet README.md; then
            echo "Changes detected in README.md. Committing and pushing..."
            git add README.md
            git commit -m "docs: auto-update README.md"
            git push
          else
            echo "No changes in README.md."
          fi
